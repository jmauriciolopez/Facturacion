version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: tax-ar-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-12781278}
      POSTGRES_DB: facturador
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build:
      context: .
      target: production
    container_name: tax-ar-app
    restart: always
    environment:
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-12781278}@db:5432/facturador?schema=public
      PORT: 3000
      NODE_ENV: production
      # Otros valores necesarios pueden mapearse aquí
    ports:
      - "3000:3000"
    depends_on:
      - db

volumes:
  pgdata:
